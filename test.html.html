<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret 💖</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        width: 320px;
        animation: fadeIn 0.8s ease;
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        padding: 10px;
        width: 80%;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 20px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-primary {
        background: #ff4b5c;
        color: white;
    }

    .btn-yes {
        background: #28a745;
        color: white;
        margin: 10px;
    }

    .btn-no {
        background: #dc3545;
        color: white;
        position: absolute;
    }

    #app {
        display: none;
        position: relative;
        height: 200px;
    }

    #result {
        margin-top: 20px;
        font-size: 22px;
        color: #ff4b5c;
        animation: pop 0.5s ease;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: scale(0.9);}
        to {opacity: 1; transform: scale(1);}
    }

    @keyframes pop {
        0% {transform: scale(0);}
        100% {transform: scale(1);}
    }
</style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="login">
        <h2>🔒 Accès secret</h2>
        <input type="password" id="password" placeholder="Mot de passe">
        <br>
        <button class="btn-primary" onclick="checkPassword()">Entrer</button>
    </div>

    <!-- APP -->
    <div id="app">
        <h2>Tu m’aimes ? 😏</h2>

        <button class="btn-yes" onclick="sayLove()">OUI 💖</button>
        <button class="btn-no" id="noBtn">NON 😅</button>

        <div id="result"></div>
    </div>

</div>

<script>
    const noBtn = document.getElementById("noBtn");

    function checkPassword() {
        let pass = document.getElementById("password").value;

        if (pass === "2006") {
            document.getElementById("login").style.display = "none";
            document.getElementById("app").style.display = "block";
        } else {
            alert("Mot de passe incorrect 😅");
        }
    }

    // bouton NON qui fuit
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 200;
        const y = Math.random() * 150;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function sayLove() {
        document.getElementById("result").innerHTML = "Moi aussi ❤️😍";
    }
</script>

</body>
</html>
